<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=2160">
  <title>Kelkun — Store Visual 1</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 2160px;
      height: 3840px;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: #0E2F58;
      position: relative;
    }

    .slide {
      width: 2160px;
      height: 3840px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ---- Background gradient ---- */
    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 140% 60% at 50% 100%, rgba(3, 197, 184, 0.18) 0%, transparent 70%),
        radial-gradient(ellipse 80% 50% at 80% 30%, rgba(3, 197, 184, 0.08) 0%, transparent 60%),
        linear-gradient(180deg, #0a2340 0%, #0E2F58 40%, #112d50 100%);
      z-index: 0;
    }

    /* ---- Subtle pattern overlay ---- */
    .bg-pattern {
      position: absolute;
      inset: 0;
      opacity: 0.03;
      background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,0.5) 1px, transparent 0);
      background-size: 48px 48px;
      z-index: 1;
    }

    /* ---- Top headline section ---- */
    .headline-section {
      position: relative;
      z-index: 10;
      padding: 240px 140px 0;
      flex-shrink: 0;
    }

    .headline {
      font-size: 180px;
      font-weight: 900;
      line-height: 1.05;
      color: #ffffff;
      letter-spacing: -3px;
      max-width: 1900px;
    }

    .headline .accent {
      color: #03C5B8;
    }

    .headline .line2 {
      font-style: italic;
    }

    /* ---- Artisan photo area ---- */
    .artisan-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2200px;
      z-index: 5;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    .artisan-container {
      position: relative;
      width: 1800px;
      height: 2100px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }

    /* Artisan silhouette placeholder - stylized illustration */
    .artisan-visual {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .artisan-figure {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 1500px;
      height: 2000px;
    }

    /* SVG artisan illustration */
    .artisan-svg {
      width: 100%;
      height: 100%;
    }

    /* ---- Glow behind artisan ---- */
    .artisan-glow {
      position: absolute;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      width: 1400px;
      height: 1400px;
      background: radial-gradient(ellipse, rgba(3, 197, 184, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;
    }

    /* ---- Floating trust badges ---- */
    .badge {
      position: absolute;
      z-index: 20;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 32px;
      padding: 36px 52px;
      display: flex;
      align-items: center;
      gap: 28px;
      color: #ffffff;
      font-weight: 600;
      font-size: 44px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .badge-icon {
      width: 72px;
      height: 72px;
      background: rgba(3, 197, 184, 0.25);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .badge-icon svg {
      width: 40px;
      height: 40px;
      fill: #03C5B8;
    }

    .badge-1 {
      left: 100px;
      bottom: 980px;
      animation: float 6s ease-in-out infinite;
    }

    .badge-2 {
      right: 100px;
      bottom: 1300px;
      animation: float 6s ease-in-out infinite 2s;
    }

    .badge-3 {
      left: 160px;
      bottom: 1620px;
      animation: float 6s ease-in-out infinite 4s;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-16px); }
    }

    /* ---- Bottom CTA area ---- */
    .bottom-section {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 15;
      padding: 0 140px 200px;
      background: linear-gradient(0deg,
        rgba(14, 47, 88, 1) 0%,
        rgba(14, 47, 88, 0.95) 30%,
        rgba(14, 47, 88, 0.7) 60%,
        transparent 100%
      );
      height: 600px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .logo-bottom {
      opacity: 0.95;
    }

    /* ---- Decorative elements ---- */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      border: 3px solid rgba(3, 197, 184, 0.15);
      z-index: 2;
    }

    .deco-circle-1 {
      width: 600px;
      height: 600px;
      top: -100px;
      right: -200px;
    }

    .deco-circle-2 {
      width: 400px;
      height: 400px;
      top: 800px;
      left: -150px;
    }

    .deco-circle-3 {
      width: 200px;
      height: 200px;
      bottom: 1400px;
      right: 200px;
    }

    /* Stars / rating visual */
    .stars {
      display: flex;
      gap: 12px;
    }

    .star {
      width: 40px;
      height: 40px;
      fill: #FFC114;
    }
  </style>
</head>
